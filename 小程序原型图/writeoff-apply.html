<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>申请核销 · 竞赛通</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
body{background:var(--c-gray-50);padding-bottom:90px;}
.w-nav{background:linear-gradient(135deg,#1B5E20,#2E7D32);padding:14px var(--space-4);display:flex;align-items:center;gap:12px;}
.w-back{width:34px;height:34px;border-radius:var(--radius-sm);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:white;cursor:pointer;touch-action:manipulation;}
.w-title{font-size:17px;font-weight:700;color:white;flex:1;}
/* 权益摘要 */
.rights-summary{margin:12px 16px 0;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:1px solid rgba(27,94,32,.15);border-radius:var(--radius-lg);padding:16px;display:flex;gap:12px;align-items:center;}
.rs-icon{font-size:32px;flex-shrink:0;}
.rs-info{flex:1;}
.rs-name{font-size:16px;font-weight:800;color:#1B5E20;}
.rs-remain{font-size:13px;color:#2E7D32;margin-top:3px;}
/* 权益类型选择 */
.type-chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 16px 0;}
.type-chip{padding:8px 14px;border-radius:var(--radius-full);border:1.5px solid var(--c-gray-100);background:var(--c-white);font-size:13px;font-weight:600;color:var(--c-gray-600);cursor:pointer;touch-action:manipulation;transition:all var(--duration-fast);}
.type-chip.active{border-color:var(--c-success);background:var(--c-success-50);color:var(--c-success);}
/* 表单卡 */
.form-card{background:var(--c-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);margin:12px 16px 0;padding:16px;}
.fc-title{font-size:14px;font-weight:700;color:var(--c-gray-900);margin-bottom:14px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:12px;font-weight:700;color:var(--c-gray-600);margin-bottom:7px;}
.form-row input,.form-row textarea,.form-row select{width:100%;border:1.5px solid var(--c-gray-100);border-radius:var(--radius-md);padding:12px 14px;font-size:15px;font-family:var(--font-body);color:var(--c-gray-900);background:var(--c-white);outline:none;-webkit-appearance:none;}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--c-success);}
.form-row textarea{min-height:80px;resize:none;line-height:1.6;}
.upload-zone{border:2px dashed var(--c-gray-100);border-radius:var(--radius-md);padding:24px;text-align:center;cursor:pointer;background:var(--c-gray-50);touch-action:manipulation;transition:all var(--duration-fast);}
.upload-zone:active{border-color:var(--c-success);background:var(--c-success-50);}
.upload-icon{font-size:32px;margin-bottom:8px;}
.upload-text{font-size:13px;color:var(--c-gray-500);}
/* 费用预估 */
.fee-card{background:var(--c-success-50);border:1px solid rgba(39,174,96,.2);border-radius:var(--radius-lg);margin:12px 16px 0;padding:14px 16px;}
.fee-row{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;}
.fee-row:last-child{padding-top:8px;border-top:1px solid rgba(39,174,96,.2);margin-top:6px;}
.fee-key{color:var(--c-gray-700);}
.fee-val{font-weight:700;color:var(--c-gray-900);}
.fee-val.green{color:var(--c-success);font-size:18px;}
/* 底部 */
.cta-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:var(--c-white);border-top:1px solid var(--c-gray-100);padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:100;}
.cta-btn{width:100%;height:52px;background:var(--c-success);color:white;border:none;border-radius:var(--radius-md);font-size:16px;font-weight:800;cursor:pointer;touch-action:manipulation;}
.cta-btn:active{opacity:.9;}
</style>
</head>
<body>
<div class="status-bar" style="background:#1B5E20;"><span class="time">9:41</span><span class="icons">📶 🔋</span></div>
<div class="w-nav animate-in">
  <div class="w-back" onclick="history.back()">←</div>
  <div class="w-title">申请核销</div>
</div>

<div class="rights-summary animate-in animate-in-d1">
  <div class="rs-icon">🏟️</div>
  <div class="rs-info">
    <div class="rs-name">场地减免权益</div>
    <div class="rs-remain">剩余可用 2 次 · 每次最高减免 ¥500</div>
  </div>
</div>

<!-- 权益类型选择（不同权益展示不同表单模板）-->
<div class="type-chips animate-in animate-in-d1">
  <div class="type-chip active" onclick="selectType(this,'venue')">🏟️ 场地减免</div>
  <div class="type-chip" onclick="selectType(this,'course')">📚 专属课程</div>
  <div class="type-chip" onclick="selectType(this,'service')">💼 客服特权</div>
</div>

<!-- 场地减免表单 -->
<div class="form-card animate-in animate-in-d2" id="form-venue">
  <div class="fc-title">核销申请信息</div>
  <div class="form-row">
    <label>场地名称 <span style="color:var(--c-accent);">*</span></label>
    <input type="text" placeholder="请输入预订场地名称" value="广州越秀区体育活动中心">
  </div>
  <div class="form-row">
    <label>预订日期 <span style="color:var(--c-accent);">*</span></label>
    <input type="date" value="2026-04-05">
  </div>
  <div class="form-row">
    <label>申请减免金额（元）<span style="color:var(--c-accent);">*</span></label>
    <input type="number" placeholder="最高 500 元" value="400" id="applyAmt" oninput="calcFee()">
  </div>
  <div class="form-row">
    <label>申请说明</label>
    <textarea placeholder="选填，说明核销用途或补充信息">为学生参赛排练预订场地，使用渠道方场地减免权益申请抵扣。</textarea>
  </div>
  <div class="form-row">
    <label>上传附件（预订截图/发票等）</label>
    <div class="upload-zone" onclick="showToast('上传功能演示')">
      <div class="upload-icon">📎</div>
      <div class="upload-text">点击上传附件 · 支持图片/PDF · 每份不超过10MB</div>
    </div>
  </div>
</div>

<!-- 费用预估 -->
<div class="fee-card animate-in animate-in-d3">
  <div class="fee-row"><div class="fee-key">场地原价</div><div class="fee-val">¥1,200.00</div></div>
  <div class="fee-row"><div class="fee-key">申请减免</div><div class="fee-val" style="color:var(--c-success);">-¥<span id="feeDiscount">400</span>.00</div></div>
  <div class="fee-row"><div class="fee-key">预估实付</div><div class="fee-val green">¥<span id="feeFinal">800</span>.00</div></div>
</div>

<div class="notice notice-info" style="margin:12px 16px 0;">
  <span class="notice-icon">ℹ️</span>
  <div>提交后，平台将在 1-3 个工作日内审核。审核通过后生成核销码，凭核销码到场地现场核销。</div>
</div>

<div class="cta-bar">
  <button class="cta-btn" onclick="submitApply()">提交核销申请</button>
</div>

<script>
function selectType(el,type){
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  ['venue','course','service'].forEach(t=>{
    const f=document.getElementById('form-'+t);
    if(f) f.style.display=t===type?'block':'none';
  });
}
function calcFee(){
  const amt=Math.min(500,Math.max(0,parseInt(document.getElementById('applyAmt').value)||0));
  document.getElementById('feeDiscount').textContent=amt;
  document.getElementById('feeFinal').textContent=1200-amt;
}
function submitApply(){
  showToast('核销申请已提交！预计 1-3 工作日审核');
  setTimeout(()=>history.back(),1500);
}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
</script>
</body>
</html>
