<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>发布公告 · 竞赛通管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
body{background:var(--c-gray-50);padding-bottom:100px;}
.admin-nav{background:linear-gradient(135deg,#1A237E,#283593);padding:14px var(--space-4);display:flex;align-items:center;gap:12px;}
.admin-nav .back-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:white;cursor:pointer;touch-action:manipulation;}
.admin-nav-title{font-size:17px;font-weight:700;color:white;flex:1;}

.form-card{background:var(--c-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);margin:14px var(--space-4) 0;padding:16px;}
.form-label{font-size:13px;font-weight:700;color:var(--c-gray-700);margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.form-label .required{color:var(--c-danger);}
.form-input{width:100%;height:50px;border:1.5px solid var(--c-gray-100);border-radius:var(--radius-md);padding:0 14px;font-size:15px;color:var(--c-gray-900);outline:none;font-family:var(--font-body);background:var(--c-white);transition:border-color var(--duration-fast);}
.form-input:focus{border-color:var(--c-primary-400);box-shadow:0 0 0 3px rgba(26,124,217,0.1);}
.form-textarea{width:100%;min-height:160px;border:1.5px solid var(--c-gray-100);border-radius:var(--radius-md);padding:12px 14px;font-size:14px;color:var(--c-gray-900);outline:none;font-family:var(--font-body);background:var(--c-white);resize:none;line-height:1.7;transition:border-color var(--duration-fast);}
.form-textarea:focus{border-color:var(--c-primary-400);}
.form-group{margin-bottom:18px;}

/* 类型选择器 */
.type-selector{display:flex;gap:8px;flex-wrap:wrap;}
.type-opt{padding:8px 16px;border-radius:var(--radius-full);border:1.5px solid var(--c-gray-100);background:var(--c-gray-50);font-size:13px;color:var(--c-gray-700);cursor:pointer;transition:all var(--duration-fast);touch-action:manipulation;}
.type-opt.active{background:var(--c-primary-50);border-color:var(--c-primary-400);color:var(--c-primary-600);font-weight:700;}

/* 关联赛事 */
.link-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--c-gray-50);}
.link-row:last-child{border-bottom:none;}
.link-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.link-name{flex:1;font-size:14px;color:var(--c-gray-900);}
.link-select{font-size:13px;color:var(--c-primary-600);font-weight:600;cursor:pointer;}

/* 底部 */
.action-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:var(--c-white);border-top:1px solid var(--c-gray-100);padding:12px var(--space-4) calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:100;}
.btn-draft{flex:1;height:50px;background:var(--c-gray-50);color:var(--c-gray-700);border:1px solid var(--c-gray-100);border-radius:var(--radius-md);font-size:15px;font-weight:600;cursor:pointer;}
.btn-publish{flex:2;height:50px;background:linear-gradient(135deg,#1A237E,#3F51B5);color:white;border:none;border-radius:var(--radius-md);font-size:16px;font-weight:800;cursor:pointer;touch-action:manipulation;}
</style>
</head>
<body>
<div class="status-bar" style="background:#1A237E;"><span class="time">9:41</span><span class="icons">📶 🔋</span></div>
<div class="admin-nav animate-in">
  <div class="back-btn" onclick="history.back()">←</div>
  <div class="admin-nav-title">发布公告</div>
</div>

<div class="form-card animate-in animate-in-d1">
  <div class="form-group">
    <div class="form-label">公告类型 <span class="required">*</span></div>
    <div class="type-selector">
      <div class="type-opt active" onclick="selectType(this)">🏆 赛事通知</div>
      <div class="type-opt" onclick="selectType(this)">📢 平台公告</div>
      <div class="type-opt" onclick="selectType(this)">🎉 活动资讯</div>
    </div>
  </div>
  <div class="form-group">
    <div class="form-label">公告标题 <span class="required">*</span></div>
    <input class="form-input" type="text" placeholder="请输入公告标题" value="安徒生(国际)艺术奖作品提交截止提醒">
  </div>
  <div class="form-group">
    <div class="form-label">公告正文 <span class="required">*</span></div>
    <textarea class="form-textarea" placeholder="请输入公告内容...">
尊敬的参赛选手，安徒生(国际)艺术奖作品电子稿提交截止时间为 2025年12月20日 23:59。

请务必在截止时间前完成以下事项：
1. 上传高清作品电子稿（JPG/PNG，≥300DPI，长边≥2000px）
2. 确认参赛类别和组别信息无误
3. 检查证件照是否清晰

如有疑问请联系：art@jst.edu.cn</textarea>
  </div>
  <div class="form-group">
    <div class="form-label">关联赛事（可选）</div>
    <div class="link-row">
      <div class="link-icon" style="background:linear-gradient(135deg,#4A0E8F,#9C27B0);">🏆</div>
      <div class="link-name">安徒生(国际)艺术奖</div>
      <div class="link-select">已关联</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;padding-top:8px;">
    <div style="display:flex;align-items:center;gap:6px;font-size:14px;color:var(--c-gray-700);cursor:pointer;" onclick="this.querySelector('input').checked=!this.querySelector('input').checked">
      <input type="checkbox" id="topCheck" style="width:16px;height:16px;">
      <label for="topCheck">置顶显示</label>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:14px;color:var(--c-gray-700);cursor:pointer;" onclick="this.querySelector('input').checked=!this.querySelector('input').checked">
      <input type="checkbox" id="pushCheck" style="width:16px;height:16px;" checked>
      <label for="pushCheck">推送消息通知</label>
    </div>
  </div>
</div>

<div class="action-bar">
  <button class="btn-draft" onclick="saveDraft()">存草稿</button>
  <button class="btn-publish" onclick="doPublish()">📢 立即发布</button>
</div>

<script>
function selectType(el){document.querySelectorAll('.type-opt').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function saveDraft(){const t=document.createElement('div');t.className='toast';t.textContent='草稿已保存';document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
function doPublish(){const t=document.createElement('div');t.className='toast';t.textContent='📢 公告已发布，通知已推送';document.body.appendChild(t);setTimeout(()=>{t.remove();history.back();},1500);}
</script>
</body>
</html>
