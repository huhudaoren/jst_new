<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>用户管理 · 竞赛通管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
body{background:var(--c-gray-50);padding-bottom:24px;}
.admin-nav{background:linear-gradient(135deg,#1A237E,#283593);padding:14px var(--space-4);display:flex;align-items:center;gap:12px;}
.admin-nav .back-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:white;cursor:pointer;touch-action:manipulation;}
.admin-nav-title{font-size:17px;font-weight:700;color:white;flex:1;}
.search-bar{background:var(--c-white);padding:10px var(--space-4);display:flex;gap:8px;border-bottom:1px solid var(--c-gray-100);}
.search-bar input{flex:1;height:40px;border:1.5px solid var(--c-gray-100);border-radius:var(--radius-full);padding:0 16px;font-size:14px;outline:none;font-family:var(--font-body);}
.filter-bar{background:var(--c-white);padding:8px var(--space-4);display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--c-gray-100);}
.filter-pill{padding:5px 14px;border-radius:var(--radius-full);background:var(--c-gray-50);border:1px solid var(--c-gray-100);font-size:12px;font-weight:600;color:var(--c-gray-700);cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation;}
.filter-pill.active{background:var(--c-primary-50);border-color:var(--c-primary-400);color:var(--c-primary-600);}

.user-card{background:var(--c-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);margin:10px var(--space-4) 0;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;touch-action:manipulation;transition:box-shadow var(--duration-fast);}
.user-card:active{box-shadow:var(--shadow-md);}
.u-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:14px;font-weight:700;color:var(--c-gray-900);}
.u-meta{font-size:12px;color:var(--c-gray-500);margin-top:2px;}
.u-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.u-status{flex-shrink:0;text-align:right;}
.u-action{font-size:12px;font-weight:700;padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;touch-action:manipulation;}
.u-action.ban{color:var(--c-danger);background:var(--c-danger-50);border:1px solid rgba(231,76,60,0.2);}
.u-action.unban{color:var(--c-success);background:var(--c-success-50);border:1px solid rgba(39,174,96,0.2);}
</style>
</head>
<body>
<div class="status-bar" style="background:#1A237E;"><span class="time">9:41</span><span class="icons">📶 🔋</span></div>
<div class="admin-nav animate-in">
  <div class="back-btn" onclick="history.back()">←</div>
  <div class="admin-nav-title">用户管理</div>
</div>
<div class="search-bar">
  <input type="text" placeholder="🔍  搜索手机号 / 用户名 / 学校">
</div>
<div class="filter-bar">
  <div class="filter-pill active" onclick="filterPill(this)">全部用户</div>
  <div class="filter-pill" onclick="filterPill(this)">学生</div>
  <div class="filter-pill" onclick="filterPill(this)">已认证老师</div>
  <div class="filter-pill" onclick="filterPill(this)">机构</div>
  <div class="filter-pill" onclick="filterPill(this)">已封禁</div>
</div>

<div class="user-card animate-in animate-in-d1">
  <div class="u-avatar" style="background:linear-gradient(135deg,#1B5E20,#66BB6A);">😊</div>
  <div class="u-info">
    <div class="u-name">张小明</div>
    <div class="u-meta">138****8888 · 注册于 2025-09-01</div>
    <div class="u-tags">
      <span class="tag tag-gray tag-sm">学生</span>
      <span class="tag tag-primary tag-sm">已绑定老师</span>
    </div>
  </div>
  <div class="u-status">
    <div class="u-action ban" onclick="banUser(this)">封禁</div>
  </div>
</div>

<div class="user-card animate-in animate-in-d2">
  <div class="u-avatar" style="background:linear-gradient(135deg,#3F51B5,#5C6BC0);">👨‍🏫</div>
  <div class="u-info">
    <div class="u-name">王建国</div>
    <div class="u-meta">139****0001 · 注册于 2025-08-15</div>
    <div class="u-tags">
      <span class="tag tag-gray tag-sm">老师</span>
      <span class="tag tag-success tag-dot tag-sm">已认证</span>
      <span class="tag tag-gray tag-sm">12名学生</span>
    </div>
  </div>
  <div class="u-status">
    <div class="u-action ban" onclick="banUser(this)">封禁</div>
  </div>
</div>

<div class="user-card animate-in animate-in-d3">
  <div class="u-avatar" style="background:linear-gradient(135deg,#7B1FA2,#AB47BC);">🏢</div>
  <div class="u-info">
    <div class="u-name">广州艺起来文化教育</div>
    <div class="u-meta">021****8899 · 注册于 2025-07-20</div>
    <div class="u-tags">
      <span class="tag tag-gray tag-sm">机构</span>
      <span class="tag tag-success tag-dot tag-sm">已认证</span>
    </div>
  </div>
  <div class="u-status">
    <div class="u-action ban" onclick="banUser(this)">封禁</div>
  </div>
</div>

<div class="user-card animate-in animate-in-d3">
  <div class="u-avatar" style="background:var(--c-gray-300);">😶</div>
  <div class="u-info">
    <div class="u-name">李某某</div>
    <div class="u-meta">136****2233 · 封禁于 2026-02-15</div>
    <div class="u-tags">
      <span class="tag tag-gray tag-sm">学生</span>
      <span class="tag tag-danger tag-sm">已封禁</span>
    </div>
  </div>
  <div class="u-status">
    <div class="u-action unban" onclick="unbanUser(this)">解封</div>
  </div>
</div>

<script>
function filterPill(el){document.querySelectorAll('.filter-pill').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function banUser(el){
  if(confirm('确认封禁该用户？封禁后该用户无法登录')){
    const t=document.createElement('div');t.className='toast';t.textContent='已封禁用户，通知已发送';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
    el.textContent='解封';el.classList.replace('ban','unban');
  }
}
function unbanUser(el){
  const t=document.createElement('div');t.className='toast';t.textContent='已解除封禁';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
  el.textContent='封禁';el.classList.replace('unban','ban');
}
</script>
</body>
</html>
