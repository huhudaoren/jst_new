<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>赛事管理 · 竞赛通</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
body{background:var(--c-gray-50);padding-bottom:24px;}
.e-nav{background:linear-gradient(135deg,#1B5E20,#2E7D32);padding:14px var(--space-4);display:flex;align-items:center;gap:12px;}
.e-back{width:34px;height:34px;border-radius:var(--radius-sm);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:white;cursor:pointer;touch-action:manipulation;}
.e-title{font-size:17px;font-weight:700;color:white;flex:1;}
.e-action{padding:6px 14px;border-radius:var(--radius-full);background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);font-size:12px;font-weight:700;color:white;cursor:pointer;touch-action:manipulation;}
.tab-bar{display:flex;background:var(--c-white);border-bottom:1px solid var(--c-gray-100);overflow-x:auto;}
.tab-item{flex-shrink:0;padding:0 16px;height:44px;display:flex;align-items:center;font-size:13px;font-weight:500;color:var(--c-gray-500);cursor:pointer;position:relative;white-space:nowrap;touch-action:manipulation;}
.tab-item.active{color:#2E7D32;font-weight:700;}
.tab-item.active::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2.5px;background:#2E7D32;border-radius:1px;}
.list-card{background:var(--c-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);margin:10px 16px 0;overflow:hidden;cursor:pointer;touch-action:manipulation;}
.list-card:active{opacity:.92;}
.lc-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--c-gray-100);}
.lc-row:last-child{border-bottom:none;}
.lc-icon{width:42px;height:42px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.lc-info{flex:1;}
.lc-name{font-size:14px;font-weight:700;color:var(--c-gray-900);}
.lc-meta{font-size:11px;color:var(--c-gray-500);margin-top:2px;}
.lc-right{text-align:right;flex-shrink:0;}
.lc-val{font-size:14px;font-weight:700;color:var(--c-primary-600);}
.lc-sub{font-size:11px;color:var(--c-gray-500);margin-top:2px;}
</style>
</head>
<body>
<div class="status-bar" style="background:#1B5E20;"><span class="time">9:41</span><span class="icons">📶 🔋</span></div>

<div class="e-nav animate-in">
  <div class="e-back" onclick="history.back()">←</div>
  <div class="e-title">赛事管理</div>
  <div class="e-action" onclick="location.href='event-contest-edit.html'">+ 新建</div>
</div>
<div class="tab-bar">
  <div class="tab-item active" onclick="switchTab(this)">全部</div>
  <div class="tab-item" onclick="switchTab(this)">草稿</div>
  <div class="tab-item" onclick="switchTab(this)">待审核</div>
  <div class="tab-item" onclick="switchTab(this)">已上线</div>
  <div class="tab-item" onclick="switchTab(this)">已下线</div>
</div>
<div class="list-card animate-in animate-in-d1" onclick="location.href='event-contest-edit.html'">
  <div style="padding:14px 16px;border-bottom:1px solid var(--c-gray-100);">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#4A0E8F,#9C27B0);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🎨</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:700;color:var(--c-gray-900);">春季艺术大赛·综合艺术组</div><div style="font-size:11px;color:var(--c-gray-500);margin-top:2px;">报名期：2026-03-01 至 06-30 · ¥180/人</div></div>
      <span class="tag tag-success tag-dot">已上线</span>
    </div>
  </div>
  <div style="display:flex;padding:10px 16px;gap:16px;font-size:12px;color:var(--c-gray-700);">
    <span>报名 126 人</span><span>|</span><span>待审核 0</span><span>|</span><span>成绩待导入</span>
  </div>
  <div style="padding:0 16px 12px;display:flex;gap:8px;">
    <div style="flex:1;height:34px;background:var(--c-gray-50);border:1px solid var(--c-gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--c-gray-700);cursor:pointer;" onclick="event.stopPropagation();location.href='event-enroll-manage.html'">报名管理</div>
    <div style="flex:1;height:34px;background:var(--c-gray-50);border:1px solid var(--c-gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--c-gray-700);cursor:pointer;" onclick="event.stopPropagation();location.href='event-score-manage.html'">成绩导入</div>
    <div style="width:34px;height:34px;background:var(--c-gray-50);border:1px solid var(--c-gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;" onclick="event.stopPropagation();showToast('编辑赛事')">✏️</div>
  </div>
</div>
<div class="list-card animate-in animate-in-d2" onclick="location.href='event-contest-edit.html'">
  <div style="padding:14px 16px;border-bottom:1px solid var(--c-gray-100);">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#0D47A1,#42A5F5);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🎵</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:700;color:var(--c-gray-900);">全国美育大赛·秋季赛</div><div style="font-size:11px;color:var(--c-gray-500);margin-top:2px;">草稿，待完善内容并提交审核</div></div>
      <span class="tag tag-gray">草稿</span>
    </div>
  </div>
  <div style="padding:0 16px 12px;display:flex;gap:8px;margin-top:10px;">
    <div style="flex:2;height:34px;background:linear-gradient(135deg,#1B5E20,#43A047);border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;cursor:pointer;" onclick="event.stopPropagation();showToast('编辑赛事')">继续编辑</div>
    <div style="flex:1;height:34px;background:var(--c-danger-50);border:1px solid rgba(231,76,60,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--c-danger);cursor:pointer;" onclick="event.stopPropagation();showToast('已删除草稿')">删除</div>
  </div>
</div>

<script>
function switchTab(el){document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
</script>
</body>
</html>
