name: 我的报名记录
description: 验证报名记录列表的展示、状态Tab切换、卡片信息完整性、操作入口
login: MOCK_1001
precondition:
  - sql: "SELECT COUNT(*) as cnt FROM jst_enrollment WHERE user_id = 1001 AND del_flag = '0'"
    expect: "cnt >= 1"
steps:
  - name: 进入我的报名页面
    action: navigate
    path: /pages-sub/my/enroll
    wait: 2000
    check:
      - screenshot: true
      - element: ".my-enroll-page__nav-title"
        expect: exists
      - element: ".my-enroll-page__tabs"
        expect: exists
      - product_review:
          - "报名记录页的状态Tab分类是否合理？用户能否快速找到想查看的报名状态？"
          - "默认展示的Tab是否是用户最关心的状态（如'待审核'或'全部'）？"

  - name: 查看报名卡片信息
    action: wait
    wait: 500
    check:
      - element: ".my-enroll-page__card"
        expect: exists
      - product_review:
          - "报名卡片是否展示了核心信息：赛事名称、参赛人、报名号、审核状态、提交时间？"
          - "审核状态标签的颜色区分是否合理（通过/驳回/待审核/需补充材料）？用户能否一眼辨别？"
          - "被驳回或需要补充材料的报名，提示横幅是否足够醒目？用户是否知道下一步该做什么？"

  - name: 切换到已通过Tab
    action: tap
    selector: ".my-enroll-page__tab:nth-child(3)"
    wait: 1500
    check:
      - screenshot: true
      - product_review:
          - "Tab切换后列表是否正确筛选？如果没有对应状态的记录，空状态提示是否友好？"
          - "已审核通过的报名卡片是否显示了后续操作入口（如'去支付'/'查看详情'）？"

  - name: 滚动查看更多报名记录
    action: scroll
    direction: down
    distance: 500
    wait: 1000
    check:
      - screenshot: true
      - product_review:
          - "多条报名记录的卡片间距是否合理？列表是否便于上下滚动浏览？"
          - "每条报名记录是否可点击进入详情？点击热区是否覆盖整个卡片？"
