name: 零元赛事报名
description: 验证免费赛事报名流程——无需支付步骤，直接提交审核
login: MOCK_1001
precondition:
  - sql: "SELECT COUNT(*) as cnt FROM jst_contest WHERE contest_id = 8805 AND price = 0 AND del_flag = '0'"
    expect: "cnt >= 1"
    fix_sql: "UPDATE jst_contest SET price = 0.00, audit_status = 'online', status = 'enrolling', enroll_start_time = DATE_SUB(NOW(), INTERVAL 1 DAY), enroll_end_time = DATE_ADD(NOW(), INTERVAL 30 DAY) WHERE contest_id = 8805 AND del_flag = '0'"
  - sql: "SELECT COUNT(*) as cnt FROM jst_participant WHERE user_id = 1001 AND del_flag = '0'"
    expect: "cnt >= 1"
steps:
  - name: 进入零元赛事报名页
    action: navigate
    path: /pages-sub/contest/enroll
    query:
      contestId: "8805"
    wait: 2500
    check:
      - screenshot: true
      - element: ".enroll-page__hero"
        expect: exists
      - product_review:
          - "对于免费赛事，报名页的费用区域是否展示'免费'或'¥0'？展示方式是否让用户放心（不会产生费用）？"
          - "免费赛事的报名流程与付费赛事是否一致？用户是否需要跳过支付相关的选择步骤？"

  - name: 选择参赛人
    action: tap
    selector: ".enroll-page__participant:first-child"
    wait: 1000
    check:
      - element: ".enroll-page__participant--active"
        expect: exists
      - product_review:
          - "免费赛事是否仍然要求选择参赛人和填写表单？流程简化程度是否合适？"

  - name: 滚动查看提交区域
    action: scroll
    direction: down
    distance: 800
    wait: 800
    check:
      - screenshot: true
      - product_review:
          - "免费赛事的底部是否隐藏了积分/优惠券选择区域？页面是否比付费赛事更简洁？"
          - "提交按钮文案对于免费赛事是否仍为'提交报名'？是否需要区分'免费报名'？"
          - "用户能否理解提交后的流程——提交后进入审核，审核通过后无需支付即可参赛？"
