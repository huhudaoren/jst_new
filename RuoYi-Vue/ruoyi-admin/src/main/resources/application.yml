# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  # 注:验证码开关在数据库 sys_config 表 sys.account.captchaEnabled
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  # 注: *Mapper*.xml 同时匹配 XxxMapper.xml 和 XxxMapperExt.xml (jst 业务扩展 xml 命名规约)
  mapperLocations: classpath*:mapper/**/*Mapper*.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# ============================================================
# 竞赛通(jst) 业务配置
# 详见 架构设计/13-技术栈与依赖清单.md §4
# 敏感字段(AK/SK/AES key)必须通过环境变量注入,禁止入仓
# ============================================================
jst:
  # 安全：AES-256 字段加密密钥(32 字节 base64),由运维通过环境变量注入
  # 生成命令:openssl rand -base64 32
  # 详见 架构设计/16-安全与敏感字段.md AES Key 运维生成步骤
  security:
#    aes-key: ${JST_AES_KEY:}
    aes-key: "bE8Ru+Z5tKOwHQG5c+gogb4tC3C/QbehGpKL1dot1TQ="
  # 阿里云 OSS:文件上传(图片/凭证/合同附件等)
  oss:
    endpoint: ${JST_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${JST_OSS_AK:}
    access-key-secret: ${JST_OSS_SK:}
    bucket: ${JST_OSS_BUCKET:jst-dev}
    base-url: ${JST_OSS_BASE_URL:https://jst-dev.oss-cn-hangzhou.aliyuncs.com}

  # 阿里云 VOD:课程视频点播(jst-event 模块使用)
  vod:
    region-id: ${JST_VOD_REGION:cn-shanghai}
    access-key-id: ${JST_VOD_AK:}
    access-key-secret: ${JST_VOD_SK:}

  # 小程序认证(决策方案2-F2:Mock 模式 code 形如 MOCK_1001 直接登录,生产置 false)
  wxauth:
    mock: ${JST_WXAUTH_MOCK:true}
    appid: ${JST_WX_APPID:}
    secret: ${JST_WX_SECRET:}

  # 微信支付(决策 Q4=B:enabled=false 时启用 MockWxPayServiceImpl)
  wxpay:
    enabled: ${JST_WXPAY_ENABLED:false}
    mch-id: ${JST_WXPAY_MCHID:}
    app-id: ${JST_WXPAY_APPID:}
    api-v3-key: ${JST_WXPAY_APIV3:}
    private-key-path: ${JST_WXPAY_PRIVKEY:}
    notify-url: ${JST_WXPAY_NOTIFY:https://api.jst.example.com/jst/pay/notify/wechat}

  # 核销二维码 payload 配置
  qrcode:
    writeoff:
      # 为空时保持纯签名字符串；非空时返回 {baseUrl}?t={token}
      base-url: ""

  # 业务参数
  biz:
    # 售后宽限默认天数
    aftersale-default-days: 7
    # 雪花 ID worker 配置(0~31),集群部署时每节点不同
    snowflake-worker-id: 1
    snowflake-datacenter-id: 1
    # 100 积分=1 元(PRD V4.1 定义)
    points-cash-rate: 100
